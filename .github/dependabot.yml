version: 2
updates:
  # ビルド/開発ツール（npm）
  #   ルート直下はほぼ雛形で、実体の依存は themes/hametuha 側にあるため両方を対象にする
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/themes/hametuha"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    allow:
      - dependency-type: "direct"   # 推移的依存の単体PRを止める（脆弱性は下の security グループで拾う）
    groups:
      # 通常のバージョン更新は major も含めて1本にまとめる（個別PRの乱立を防ぐ）
      npm-dependencies:
        patterns: [ "*" ]
        update-types: [ "major", "minor", "patch" ]
      # 脆弱性修正（推移的依存含む）もまとめて1本に
      npm-security:
        applies-to: security-updates
        patterns: [ "*" ]

  # 本番依存（composer / vendorに同梱される側）
  #   ルート（WPコア・プラグイン）と themes/hametuha（テーマ独自依存）の両方を対象にする
  - package-ecosystem: "composer"
    directories:
      - "/"
      - "/themes/hametuha"
    schedule:
      interval: "weekly"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    allow:
      - dependency-type: "direct"
    groups:
      composer-dependencies:
        patterns: [ "*" ]
        update-types: [ "major", "minor", "patch" ]
      composer-security:
        applies-to: security-updates
        patterns: [ "*" ]
